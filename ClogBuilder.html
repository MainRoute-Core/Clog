<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#09090b">
    
    <!-- Icons & Manifest -->
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="https://avatars.githubusercontent.com/u/249983472?s=192&v=4">
    <title>Core Blog Builder | MainRoute</title>

    <!-- Custom Font -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/MainRoute-Core/CoreSans@main/CoreSans-Regular_en.otf" rel="stylesheet">

    <!-- External Editor Libraries -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">

    <!-- 100% INTERNAL CSS (Glassmorphism + Material) -->
    <style>
        @font-face { font-family: 'Core Sans'; src: url(https://cdn.jsdelivr.net/gh/MainRoute-Core/CoreSans@main/CoreSans-Regular_en.otf); font-display: swap; }
        :root {
            --mrc: #f44234; --mrc-light: #ff7063; --mrc-glow: rgba(244, 66, 52, 0.4);
            --danger: #ef4444; --success: #10b981; --info: #3b82f6; --warn: #f59e0b;
            --bg-dark: #09090b; --bg-surface: #18181b; --text-main: #f8fafc; --text-muted: #a1a1aa;
            --glass-bg: rgba(24, 24, 27, 0.65); --glass-border: rgba(255, 255, 255, 0.08);
            --font-sans: 'Core Sans', sans-serif; --font-mono: 'Space Mono', monospace;
            --nav-height: 80px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); background: var(--bg-dark); color: var(--text-main); line-height: 1.6; }
        a { text-decoration: none; color: inherit; }
        button, input, select, textarea { font-family: inherit; outline: none; }
        .icon { width: 1.25em; height: 1.25em; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        /* Background Effects */
        .tech-grid { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(var(--glass-border) 1px, transparent 1px), linear-gradient(90deg, var(--glass-border) 1px, transparent 1px); background-size: 40px 40px; mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%); -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%); }
        .ambient-orb { position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.15; z-index: -1; background: var(--mrc); }

        /* Navigation */
        .header { position: fixed; top: 1rem; left: 1rem; right: 1rem; z-index: 100; }
        @media (min-width: 1024px) { .header { top: 1.5rem; left: 2rem; right: 2rem; } }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--glass-border); border-radius: 1.5rem; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3); }
        .nav-bar { padding: 0.75rem 1.5rem; border-radius: 99px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { display: flex; align-items: center; gap: 0.75rem; font-size: 1.25rem; font-weight: 900; letter-spacing: -0.05em; color: white;}
        .nav-logo img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--mrc); }
        .system-status { display: flex; align-items: center; gap: 0.5rem; background: rgba(255,255,255,0.05); padding: 0.4rem 1rem; border-radius: 99px; font-size: 0.7rem; font-family: var(--font-mono); letter-spacing: 0.05em; }

        /* Main Container */
        .builder-container { max-width: 1400px; margin: calc(var(--nav-height) + 3rem) auto 2rem; padding: 0 1.5rem; position: relative; z-index: 10; display: flex; flex-direction: column; gap: 1.5rem; min-height: 80vh; }
        
        /* Metadata Form */
        .meta-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; padding: 1.5rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .form-group label { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .form-control { background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 0.75rem 1rem; border-radius: 0.75rem; color: white; transition: all 0.3s; }
        .form-control:focus { border-color: var(--mrc); background: rgba(244,66,52,0.05); box-shadow: 0 0 10px var(--mrc-glow); }
        select.form-control { appearance: none; cursor: pointer; }
        
        /* Custom Toolbar */
        .custom-toolbar { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 1rem 1.5rem; border-top: 1px solid var(--glass-border); border-bottom: 1px solid var(--glass-border); background: rgba(255,255,255,0.02); }
        .tool-btn { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--glass-border); border-radius: 0.5rem; padding: 0.4rem 0.8rem; font-size: 0.85rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; min-width: 40px; font-weight: bold; }
        .tool-btn:hover { background: rgba(244,66,52,0.1); color: var(--mrc); border-color: var(--mrc); }

        /* Editor Area */
        .editor-workspace { display: flex; flex-direction: column; flex-grow: 1; border-radius: 1.5rem; overflow: hidden; background: var(--glass-bg); backdrop-filter: blur(24px); border: 1px solid var(--glass-border); }
        .tabs-header { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 1.5rem; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--glass-border); }
        
        .tabs-group { display: flex; gap: 1rem; }
        .tab-btn { background: transparent; color: var(--text-muted); border: none; padding: 0.8rem 0; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.85rem; cursor: pointer; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--mrc); border-bottom-color: var(--mrc); }

        .actions-group { display: flex; gap: 0.5rem; }
        .btn-action { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--mrc); color: white; border: 1px solid var(--mrc); box-shadow: 0 4px 15px var(--mrc-glow); }
        .btn-primary:hover { background: var(--mrc-light); transform: translateY(-2px); }
        .btn-outline { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--glass-border); }
        .btn-outline:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-danger:hover { background: var(--danger); color: white; }

        /* Panes */
        .pane { display: none; padding: 1.5rem; flex-grow: 1; min-height: 400px; overflow-y: auto; }
        .pane.active { display: block; }
        
        /* Overriding CodeMirror & Quill for Dark Glassmorphism */
        .CodeMirror { height: auto; min-height: 400px; background: transparent !important; color: #f8fafc !important; font-family: var(--font-mono); font-size: 0.95rem; }
        .ql-container.ql-snow { border: none !important; font-family: var(--font-sans); font-size: 1.05rem; }
        .ql-editor { min-height: 400px; color: #f8fafc; }
        .ql-editor.ql-blank::before { color: rgba(255,255,255,0.3); font-style: normal; }

        /* Preview Pane Styling (Matches Reader) */
        #previewPane { color: #d1d5db; font-size: 1.05rem; }
        #previewPane h2 { color: #fff; font-size: 2rem; margin: 2rem 0 1rem; }
        #previewPane h3 { color: #fff; font-size: 1.5rem; margin: 1.5rem 0 1rem; }
        #previewPane p { margin-bottom: 1.5rem; }
        #previewPane .note, #previewPane .warn, #previewPane .success { padding: 1rem 1.5rem; border-radius: 0.75rem; margin: 1.5rem 0; border-left: 4px solid; background: rgba(255,255,255,0.02); }
        #previewPane .note { border-color: var(--info); color: #bfdbfe; }
        #previewPane .warn { border-color: var(--warn); color: #fde68a; }
        #previewPane .success { border-color: var(--success); color: #a7f3d0; }
        #previewPane pre { background: rgba(0,0,0,0.3); padding: 1.5rem; border-radius: 0.75rem; border: 1px solid var(--glass-border); overflow-x: auto; margin: 1.5rem 0; font-family: var(--font-mono); font-size: 0.9rem; }
        #previewPane blockquote { border-left: 4px solid var(--mrc); padding-left: 1rem; font-style: italic; color: var(--text-muted); margin: 1.5rem 0; }
        #previewPane img { border-radius: 0.75rem; max-width: 100%; border: 1px solid var(--glass-border); margin: 1.5rem 0; }

        #jsonPane { font-family: var(--font-mono); font-size: 0.85rem; color: #a7f3d0; white-space: pre-wrap; background: rgba(0,0,0,0.3); padding: 1.5rem; border-radius: 0.75rem; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--mrc); }

    </style>
</head>
<body>

    <!-- Ambient Backgrounds -->
    <div class="tech-grid"></div>
    <div class="ambient-orb" style="width: 40vw; height: 40vw; top: -10%; left: -10%;"></div>

    <!-- Navigation -->
    <header class="header">
        <div class="nav-bar glass-panel">
            <div class="nav-logo">
                <img src="https://avatars.githubusercontent.com/u/249983472" alt="MRC Logo">
                <span>Core <span class="text-mrc">Builder</span></span>
            </div>
            <div class="system-status">
                <span id="wordCounts">0 words</span>
            </div>
        </div>
    </header>

    <!-- Main Builder Interface -->
    <main class="builder-container">
        
        <!-- Editor Area -->
        <div class="editor-workspace">
            
            <!-- Meta Data Form -->
            <form class="meta-form" id="metaForm">
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label>Title</label>
                    <input id="titleInput" type="text" class="form-control" placeholder="Enter post title..." required>
                </div>
                <div class="form-group">
                    <label>Slug (URL)</label>
                    <input id="slugInput" type="text" class="form-control" placeholder="auto-generated-slug">
                </div>
                <div class="form-group">
                    <label>Tags (Comma separated)</label>
                    <input id="tagsInput" type="text" class="form-control" placeholder="Architecture, Node.js">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="statusInput" class="form-control">
                        <option value="Pub">Published (Pub)</option>
                        <option value="Not">Classified (Not)</option>
                        <option value="Un">Hidden (Un)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Author</label>
                    <input id="authorInput" type="text" class="form-control" value="Core System">
                </div>
                <div class="form-group">
                    <label>Hero Image URL</label>
                    <input id="imgInput" type="url" class="form-control" placeholder="https://...">

                    <input id="descInput" type="text" class="form-control" placeholder="Brief summary of the log...">

                    <button class="btn-action btn-primary" id="downloadJSON"><svg class="icon"><use href="#icon-save"></use></svg> Export</button>

    <!-- Core Builder Logic -->
    <script>
        const customTags =[
            {label:"H2",tag:"h2", icon:"H2"},
            {label:"H3",tag:"h3", icon:"H3"},
            {label:"Bold",tag:"b", icon:"B"},
            {label:"Italic",tag:"i", icon:"I"},
            {label:"Underline",tag:"u", icon:"U"},
            {label:"Paragraph",tag:"p", icon:"&para;"},
            {label:"List",tag:"ul", icon:"#icon-list"},
            {label:"Link",tag:"a", icon:"#icon-link"},
            {label:"Image",tag:"img", icon:"#icon-img"},
            {label:"Code",tag:"code", icon:"#icon-code"},
            {label:"Inline Code",tag:"ic", icon:"&lt;&gt;"},
            {label:"Quote",tag:"quote", icon:"#icon-quote"},
            {label:"Table",tag:"tbl", icon:"#icon-table"},
            {label:"Note",tag:"note", icon:"#icon-alert"},
            {label:"Warn",tag:"warn", icon:"#icon-alert"},
            {label:"Success",tag:"success", icon:"#icon-alert"}
        ];

        function getToolbarIcon(ctag) {
            if(ctag.icon.startsWith('#')) return `<svg class="icon"><use href="${ctag.icon}"></use></svg>`;
            return ctag.icon;
        }

        // --- Core Parsing Logic (Preserved from Original) ---
        function escapeHtml(str) { return (str||'').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;'); }
        function unescapeHtml(str) { return (str||'').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/&#039;/g, "'").replace(/&amp;/g, '&').replace(/&nbsp;/g, ' '); }

        function htmlToCustomSyntax(html) {
            let txt = html || '';
            txt = txt.replace(/&nbsp;/g, ' ');

            txt = txt.replace(/<strong[^>]*>([\s\S]*?)<\/strong>/gi, `\\b:$1:b\\`);
            txt = txt.replace(/<b[^>]*>([\s\S]*?)<\/b>/gi, `\\b:$1:b\\`);
            txt = txt.replace(/<em[^>]*>([\s\S]*?)<\/em>/gi, `\\i:$1:i\\`);
            txt = txt.replace(/<i[^>]*>([\s\S]*?)<\/i>/gi, `\\i:$1:i\\`);
            txt = txt.replace(/<u[^>]*>([\s\S]*?)<\/u>/gi, `\\u:$1:u\\`);
            txt = txt.replace(/<s[^>]*>([\s\S]*?)<\/s>/gi, `\\s:$1:s\\`);
            txt = txt.replace(/<code[^>]*>([\s\S]*?)<\/code>/gi, `\\ic:$1:ic\\`);
            txt = txt.replace(/<a\s+[^>]*href="([^"]+)"[^>]*>([\s\S]*?)<\/a>/gi, `\\a=$1:$2:a\\`);
            txt = txt.replace(/<img\s+[^>]*src="([^"]+)"[^>]*>/gi, `\\img=$1::img\\`);

            txt = txt.replace(/<pre[^>]*>([\s\S]*?)<\/pre>/gi, (_, code) => `\\code:\n${unescapeHtml(code)}\n:code\\\n\n`);
            txt = txt.replace(/<h2[^>]*>([\s\S]*?)<\/h2>/gi, `\\h2:$1:h2\\\n\n`);
            txt = txt.replace(/<h3[^>]*>([\s\S]*?)<\/h3>/gi, `\\h3:$1:h3\\\n\n`);
            txt = txt.replace(/<ul[^>]*>([\s\S]*?)<\/ul>/gi, (_, list) => `\\ul:\n${list.replace(/<li[^>]*>([\s\S]*?)<\/li>/gi, `\\li:$1:li\\\n`)}:ul\\\n\n`);
            txt = txt.replace(/<ol[^>]*>([\s\S]*?)<\/ol>/gi, (_, list) => `\\ol:\n${list.replace(/<li[^>]*>([\s\S]*?)<\/li>/gi, `\\li:$1:li\\\n`)}:ol\\\n\n`);
            txt = txt.replace(/<blockquote[^>]*>([\s\S]*?)<\/blockquote>/gi, `\\quote:$1:quote\\\n\n`);

            txt = txt.replace(/<p[^>]*>([\s\S]*?)<\/p>/gi, function(_, inner) {
                let trimmed = inner.trim();
                if (!trimmed || trimmed === '<br>') return ''; 
                if (/^\\(note|warn|success|tbl|hr|img[=:]|code|ul|ol|quote|h[234])[\s\S]*?\\\s*$/i.test(trimmed)) return trimmed + '\n\n';
                if (/^\\(note|warn|success|tbl|hr|img[=:]|code|ul|ol|quote|h[234])/i.test(trimmed)) return trimmed + '\n\n';
                return `\\p:${inner}:p\\\n\n`;
            });

            txt = txt.replace(/<br[^>]*>/gi, '\n');
            txt = txt.replace(/<[^>]+>/g, ''); 
            return unescapeHtml(txt).replace(/\n{3,}/g, '\n\n').trim();
        }

        function customSyntaxToHtml(txt, forQuill = false) {
            let s = txt || '';
            s = escapeHtml(s);

            s = s.replace(/\\h2:([\s\S]*?):h2\\/g,   (_,t)=> `<h2>${t}</h2>`);
            s = s.replace(/\\h3:([\s\S]*?):h3\\/g,   (_,t)=> `<h3>${t}</h3>`);
            s = s.replace(/\\p:([\s\S]*?):p\\/g,     (_,t)=> `<p>${t}</p>`);
            s = s.replace(/\\quote:([\s\S]*?):quote\\/g,(_,t)=>`<blockquote>${t}</blockquote>`);

            s = s.replace(/\\ul:\n([\s\S]*?):ul\\/g, (_,$1) => '<ul>\n'+$1.replace(/\\li:([\s\S]*?):li\\/g,(_,t)=>`<li>${t}</li>\n`)+'</ul>');

            if (forQuill) {
                s = s.replace(/\\code=([a-z0-9]*):\n([\s\S]*?)\n?:code\\/gi, (_,l,t)=> `<pre class="ql-syntax" spellcheck="false">${t}</pre>`);
                s = s.replace(/\\code:\n([\s\S]*?)\n?:code\\/gi, (_,t)=> `<pre class="ql-syntax" spellcheck="false">${t}</pre>`);
                s = s.replace(/\\note:([\s\S]*?):note\\/g, (_,t)=>`<p>\\note:${t}:note\\</p>`);
                s = s.replace(/\\warn:([\s\S]*?):warn\\/g, (_,t)=>`<p>\\warn:${t}:warn\\</p>`);
                s = s.replace(/\\success:([\s\S]*?):success\\/g, (_,t)=>`<p>\\success:${t}:success\\</p>`);
                s = s.replace(/\\tbl:\n([\s\S]*?)\n?:tbl\\/g, (_,t)=>`<p>\\tbl:\n${t}\n:tbl\\</p>`);
                s = s.replace(/\\img=([^\s:]+):([\s\S]*?):img\\/g, (_,url,alt)=>`<img src="${url}">`);
            } else {
                s = s.replace(/\\code=([a-z0-9]+):\n([\s\S]*?)\n?:code\\/gi, (_,l,t)=> `<pre><code class="language-${l}">${t}</code></pre>`);
                s = s.replace(/\\code:\n([\s\S]*?)\n?:code\\/gi, (_,t)=> `<pre><code>${t}</code></pre>`);
                s = s.replace(/\\note:([\s\S]*?):note\\/g, (_,t)=>`<div class="note">${t}</div>`);
                s = s.replace(/\\warn:([\s\S]*?):warn\\/g, (_,t)=>`<div class="warn">${t}</div>`);
                s = s.replace(/\\success:([\s\S]*?):success\\/g, (_,t)=>`<div class="success">${t}</div>`);
                s = s.replace(/\\tbl:\n([\s\S]*?)\n?:tbl\\/g, (_,t)=>{
                    let rows = t.trim().split('\n').filter(r=>r.trim());
                    if(!rows.length) return '';
                    let html='<table><tbody>';
                    rows.forEach(row => html+='<tr>'+row.split('|').map(c=>`<td>${c.trim()}</td>`).join('')+'</tr>');
                    return html+'</tbody></table>';
                });
                s = s.replace(/\\img=([^\s:]+):([\s\S]*?):img\\/g, (_,url,alt)=>`<img src="${url}" alt="${alt}">`);
            }

            s = s.replace(/\\b:([\s\S]*?):b\\/g,     (_,t)=> `<b>${t}</b>`);
            s = s.replace(/\\i:([\s\S]*?):i\\/g,     (_,t)=> `<i>${t}</i>`);
            s = s.replace(/\\u:([\s\S]*?):u\\/g,     (_,t)=> `<u>${t}</u>`);
            s = s.replace(/\\ic:([\s\S]*?):ic\\/g,   (_,t)=> `<code>${t}</code>`);
            s = s.replace(/\\a=([^\s:]+):([\s\S]*?):a\\/g, (_,url,t)=>`<a href="${url}" target="_blank">${t}</a>`);

            return s;
        }

        // --- App Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            
            // DOM Elements
            const titleInput = document.getElementById('titleInput');
            const slugInput = document.getElementById('slugInput');
            const tagsInput = document.getElementById('tagsInput');
            const statusInput = document.getElementById('statusInput');
            const authorInput = document.getElementById('authorInput');
            const imgInput = document.getElementById('imgInput');
            const descInput = document.getElementById('descInput');
            const countsSpan = document.getElementById('wordCounts');
            const STORAGE_KEY = "mrc_blog_save";

            // Build Toolbar
            const toolbar = document.getElementById('mainToolbar');
            customTags.forEach(ctag => {
                const btn = document.createElement('button');
                btn.type = "button"; btn.className = "tool-btn";
                btn.title = ctag.label;
                btn.innerHTML = getToolbarIcon(ctag);
                btn.onclick = () => insertTag(ctag.tag);
                toolbar.appendChild(btn);
            });

            // Initialize Editors
            let quill = new Quill('#quillArea', { modules: { toolbar: false }, theme: 'snow', placeholder: 'Engineer the future here...' });
            let cm = CodeMirror(document.getElementById('cmArea'), {
                mode: 'markdown', lineNumbers: true, lineWrapping: true, theme: 'default',
                autoCloseBrackets: true, matchBrackets: true, indentUnit: 4
            });

            // Tab Management
            let activeTab = "visual";
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.onclick = () => {
                    const tab = btn.dataset.tab;
                    if (activeTab === 'source' && tab === 'visual') {
                        quill.setContents(quill.clipboard.convert(customSyntaxToHtml(cm.getValue(), true)), 'silent');
                    }
                    activeTab = tab;
                    
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
                    document.getElementById(`${tab}Pane`).classList.add('active');

                    if (tab === "visual") quill.focus();
                    else if (tab === "source") { cm.refresh(); cm.focus(); }
                    else if (tab === "preview") {
                        document.getElementById('previewPane').innerHTML = customSyntaxToHtml(cm.getValue(), false);
                        Prism.highlightAll();
                    }
                    autoGenJson();
                };
            });

            // Action Mapper
            function insertTag(tag) {
                if (activeTab === 'visual') {
                    const idx = quill.getSelection(true).index;
                    if (["b","i","u"].includes(tag)) return quill.format({b:'bold',i:'italic',u:'underline'}[tag], true);
                    if (tag==="ic") return quill.format('code', true);
                    if (tag==="h2" || tag==="h3") return quill.formatLine(idx, 1, 'header', tag==="h2"?2:3);
                    if (tag==="ul") return quill.formatLine(idx, 1, 'list', 'bullet');
                    if (tag==="p") return quill.formatLine(idx, 1, 'header', false);
                    if (tag==="code") return quill.formatLine(idx, 1, 'code-block', true);
                    if (tag==="a") { let url=prompt('URL:','https://'); if(url) quill.format('link',url); return;}
                    if (tag==="img") { let url=prompt('Image URL:','https://'); if(url) quill.insertEmbed(idx, 'image', url, 'user'); return;}
                    if (tag==="quote") { let q=prompt("Quote?","Text"); if(q) quill.insertText(idx, q, {'blockquote':true}); return;}
                    if (["note","warn","success"].includes(tag)) { let n = prompt("Alert text?", ""); if(n) quill.insertText(idx, `\n\\${tag}:${n}:${tag}\\\n`); return; }
                    if (tag==="tbl") { quill.insertText(idx, `\n\\tbl:\nHeader|Header\nRow|Row\n:tbl\\\n`); return; }
                } else if (activeTab === 'source') {
                    let doc = cm.getDoc(), sel = doc.getSelection(), text = sel || "...";
                    let ins = `\\${tag}:${text}:${tag}\\`;
                    
                    if(["h2","h3"].includes(tag)) ins = `\\${tag}:${text}:${tag}\\\n`;
                    else if (tag==="p") ins = `\\p:${text}:p\\\n`;
                    else if (tag==="code") ins = `\\code:\n${text}\n:code\\\n`;
                    else if (tag==="a") ins = `\\a=https://:${text}:a\\`;
                    else if (tag==="img") ins = `\\img=https://:${text}:img\\`;
                    else if (tag==="ul") ins = `\\ul:\n\\li:${text}:li\\\n:ul\\\n`;
                    else if (tag==="tbl") ins = `\\tbl:\nName|Role\n${text}\n:tbl\\\n`;
                    else if (["note","warn","success","quote"].includes(tag)) ins = `\\${tag}:${text}:${tag}\\\n`;
                    
                    doc.replaceSelection(ins, 'around'); cm.focus();
                }
            }

            // Sync & Save
            function getOutputJSON() {
                return {
                    "Title": titleInput.value.trim(),
                    "Slug": slugInput.value.trim(),
                    "Date": new Date().toISOString().split('T')[0],
                    "Status": statusInput.value,
                    "Author": authorInput.value.trim(),
                    "Tags": (tagsInput.value||'').split(',').map(s=>s.trim()).filter(Boolean),
                    "Img": imgInput.value.trim(),
                    "Description": descInput.value.trim(),
                    "Data": cm.getValue()
                };
            }

            function autoGenJson() {
                document.getElementById('jsonPane').innerText = JSON.stringify(getOutputJSON(), null, 2);
            }

            function autoSaveDraft() {
                const data = {
                    title: titleInput.value, slug: slugInput.value, tags: tagsInput.value,
                    status: statusInput.value, author: authorInput.value, img: imgInput.value,
                    desc: descInput.value, source: cm.getValue()
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            }

            // Event Listeners
            quill.on('text-change', () => {
                if(activeTab==='visual') cm.setValue(htmlToCustomSyntax(quill.root.innerHTML));
                autoGenJson(); autoSaveDraft(); updateCounts();
            });
            
            cm.on('change', () => { autoGenJson(); autoSaveDraft(); updateCounts(); });[titleInput, slugInput, tagsInput, statusInput, authorInput, imgInput, descInput].forEach(el => 
                el.addEventListener('input', () => {
                    if(el === titleInput && !slugInput.value) {
                        slugInput.value = el.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
                    }
                    autoGenJson(); autoSaveDraft();
                })
            );

            function updateCounts() {
                let str = cm.getValue().replace(/\\[a-z0-9=]+:/gi, ' ').replace(/:[a-z0-9]+\\/gi, ' ').replace(/<[^>]+>/g,'');
                let words = (str.match(/\b\w+\b/g) ||[]).length;
                countsSpan.textContent = `${words} words`;
            }

            // Buttons
            document.getElementById('copyJSON').onclick = function() {
                navigator.clipboard.writeText(JSON.stringify(getOutputJSON(), null, 2));
                const og = this.innerHTML; this.innerHTML = '<svg class="icon"><use href="#icon-save"></use></svg> Copied!';
                setTimeout(() => this.innerHTML = og, 1500);
            };

            document.getElementById('downloadJSON').onclick = function() {
                const blob = new Blob([JSON.stringify(getOutputJSON(), null, 2)], {type: 'application/json'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = (slugInput.value || 'core_log') + '.json';
                a.click();
            };

            document.getElementById('clearAll').onclick = function() {
                if(confirm('Purge all log data? This cannot be undone.')) {
                    document.getElementById('metaForm').reset();
                    cm.setValue('');
                    localStorage.removeItem(STORAGE_KEY);
                }
            };

            // Load Draft
            try {
                let d = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
                if(d.title) {
                    titleInput.value = d.title; slugInput.value = d.slug; tagsInput.value = d.tags;
                    statusInput.value = d.status; authorInput.value = d.author; imgInput.value = d.img;
                    descInput.value = d.desc; cm.setValue(d.source || '');
                }
            } catch(e) {}

        });
    </script>
</body>
</html>
